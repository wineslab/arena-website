<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena — Antenna Mapper</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <div class="badge">Arena@Boston</div>
  </div>
  <div class="header-right">
    <span class="save-status" id="save-status">● auto-save on</span>
    <a class="btn btn-ghost" href="/api/export/json" download>Export JSON</a>
    <a class="btn btn-ghost" href="/api/export/csv" download>Export CSV</a>
  </div>
</header>

<main>
  <div class="left-pane">

    <!-- Tab switcher -->
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button id="tab-floor" class="btn btn-primary" onclick="switchTab('floor')">Map view</button>
      <button id="tab-ant"   class="btn btn-ghost"   onclick="switchTab('antenna')">Rack view</button>
    </div>

    <!-- ═══ MAP VIEW ═══════════════════════════════════════════════════════ -->
    <div id="view-floor">
      <div style="display:flex;gap:14px;margin-bottom:10px;align-items:center;">
        <!-- Legend -->
        <div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text2);">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--green);"></div>Unmapped
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text2);">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--red);"></div>Mapped
        </div>
        <span style="margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--text3);">
          scroll to zoom · drag to pan · double-click to reset
        </span>
      </div>

      <!-- Floor plan canvas (SVG image + overlaid dots injected by JS) -->
      <div id="floor-viewport">
        <div id="floor-wrap" style="position:relative;display:inline-block;width:100%;transform-origin:0 0;"></div>
      </div>
    </div>

    <!-- ═══ RACK VIEW ══════════════════════════════════════════════════════ -->
    <div id="view-antenna" style="display:none">
      <div class="rack-columns">

        <!-- Arena 1 column -->
        <div class="rack-col">
          <div class="stats">
            <div class="stat">
              <div class="stat-label">Arena 1 USRPs</div>
              <div class="stat-val" id="s-ar1-usrp">0/4</div>
            </div>
          </div>
          <div class="section-label">Arena 1 — Antenna</div>
          <div class="grid-wrap"><table class="ant-table" id="ant-table-ar1"></table></div>
          <div class="section-label" style="margin-top:20px;">Arena 1 — USRP</div>
          <div id="usrp-grid-ar1"></div>
        </div>

        <!-- Arena 2 column -->
        <div class="rack-col">
          <div class="stats">
            <div class="stat">
              <div class="stat-label">Arena 2 USRPs</div>
              <div class="stat-val" id="s-ar2-usrp">0/10</div>
            </div>
          </div>
          <div class="section-label">Arena 2 — Antenna</div>
          <div class="grid-wrap"><table class="ant-table" id="ant-table-ar2"></table></div>
          <div class="section-label" style="margin-top:20px;">Arena 2 — USRP</div>
          <div id="usrp-grid-ar2"></div>
        </div>

      </div>
    </div>

  </div>

  <!-- Right panel: antenna config form (populated by JS on selection) -->
  <div class="right-pane">
    <div id="right-content">
      <div class="empty-panel">Select an antenna<br>from grid or floor plan</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script src="{{ url_for('static', filename='js/phone.js') }}"></script>
</body>
</html>
